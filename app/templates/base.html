<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project Gappy{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --font-sans: 'Inter', system_ui, sans-serif;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .heading {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .minimal-card {
            background: white;
            border: 1px solid #f1f5f9;
            transition: all 0.1s ease;
        }
        
        .minimal-card:hover {
            border-color: #e2e8f0;
        }
        
        .section-header {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #64748b;
        }
    </style>
</head>
<body class="bg-[#fafafa] text-slate-900">
    <!-- Top Navigation Bar -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center gap-x-3">
                    <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center">
                        <span class="text-white text-sm font-semibold">G</span>
                    </div>
                    <a href="/dashboard" class="text-xl font-semibold tracking-tighter text-slate-900 hover:text-black">Project Gappy</a>
                </div>

                <!-- Navigation Links -->
                <div class="flex items-center gap-x-1 text-sm font-medium">
                    <a href="/dashboard" 
                       class="px-4 py-2 rounded-xl hover:bg-slate-100 transition-colors {% if request.url.path == '/dashboard' %}bg-slate-100 text-slate-900{% else %}text-slate-600{% endif %}">
                        Dashboard
                    </a>
                    <a href="/documents" 
                       class="px-4 py-2 rounded-xl hover:bg-slate-100 transition-colors {% if request.url.path.startswith('/documents') %}bg-slate-100 text-slate-900{% else %}text-slate-600{% endif %}">
                        Document Library
                    </a>
                    <a href="/run-analysis" 
                       class="px-4 py-2 rounded-xl hover:bg-slate-100 transition-colors {% if request.url.path == '/run-analysis' %}bg-slate-100 text-slate-900{% else %}text-slate-600{% endif %}">
                        Run Analysis
                    </a>
                    <a href="/analyses/report" 
                       class="px-4 py-2 rounded-xl hover:bg-slate-100 transition-colors {% if request.url.path.startswith('/analyses') or request.url.path == '/report' %}bg-slate-100 text-slate-900{% else %}text-slate-600{% endif %}">
                        Gap Analysis Reports
                    </a>
                </div>

                <!-- User -->
                <div class="flex items-center gap-x-3 text-sm">
                    <div class="text-slate-500">Darren Tan</div>
                    <div class="px-3 py-1 bg-slate-100 rounded-full text-xs font-medium">Compliance Officer</div>
                </div>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}
</body>
</html>
